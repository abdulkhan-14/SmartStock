kind = "web"
previewPath = "/"
title = "SmartStock"
version = "1.0.0"
id = "artifacts/smartstock"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20091

[services.development]
run = "pnpm --filter @workspace/smartstock run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smartstock", "run", "build" ]
publicDir = "artifacts/smartstock/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20091"
BASE_PATH = "/"
